<svg xmlns="http://www.w3.org/2000/svg" width="560" height="170" viewBox="0 0 560 170" role="img" aria-label="Truthprint logo">
  <defs>
    <linearGradient id="tp-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f4c81"/>
      <stop offset="1" stop-color="#12a48b"/>
    </linearGradient>
  </defs>

  <!-- Fingerprint mark: concentric ridges with a payload gap, meaning locked at center -->
  <g transform="translate(85,85)" fill="none" stroke="url(#tp-grad)" stroke-linecap="round">
    <!-- outer ridges (broken arcs = carrier bits / erasures) -->
    <path d="M 0,-62 A 62,62 0 1 1 -43.8,43.8" stroke-width="7"/>
    <path d="M -34,-40 A 52.4,52.4 0 1 1 -20,48.4" stroke-width="7" transform="rotate(196)"/>
    <path d="M 0,-42 A 42,42 0 1 1 -29.7,29.7" stroke-width="7" transform="rotate(88)"/>
    <path d="M 0,-32 A 32,32 0 1 1 -22.6,22.6" stroke-width="7" transform="rotate(-140)"/>
    <!-- payload ticks riding the outer ring -->
    <g stroke="#12a48b" stroke-width="7">
      <path d="M 51.5,-51.5 A 72.8,72.8 0 0 1 61.3,-39.3" opacity="0.9"/>
      <path d="M 70.5,-18.9 A 73,73 0 0 1 73,0" opacity="0.65"/>
      <path d="M 68.6,25 A 73,73 0 0 1 59.8,44.6" opacity="0.4"/>
    </g>
    <!-- locked truth at the core: check mark -->
    <path d="M -12,2 L -3,11 L 14,-9" stroke="#0f4c81" stroke-width="9"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="185" y="97" font-size="52" font-weight="bold" fill="#0f4c81">Truth<tspan fill="#12a48b">print</tspan></text>
    <text x="188" y="128" font-size="16.5" fill="#5b6b78" font-family="Helvetica, Arial, sans-serif">semantic provenance watermarking for LLM text</text>
  </g>
</svg>
